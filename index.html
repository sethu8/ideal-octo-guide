<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Secret Message Decoder</title>

<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Tangerine:wght@700&display=swap" rel="stylesheet">

</head>

<body>

<div class="scroll">

<h1>🕵 Secret Message Decoder 🕵</h1>

<p>
Enter the encrypted message below.
The decoder automatically counts the letters
in the first word and decodes the message.
</p>

<form method="POST">

<textarea
name="secret"
placeholder="Enter Secret Code Here..."
required></textarea>

<br>

<button type="submit">

Decode Message

</button>

</form>

<h2>Decoded Message</h2>

<textarea readonly>{{ decoded }}</textarea>

</div>

</body>

</html>
